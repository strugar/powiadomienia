<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pekao</title>

<!-- Open Graph -->
<meta property="og:title" content="PeoPay">
<meta property="og:description" content="Kliknij aby otworzyć aplikację.">
<meta property="og:image" content="https://strugar.github.io/powiadomienia/test2.gif">
<meta property="og:url" content="https://strugar.github.io/powiadomienia/test.html">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">

<style>
body{
    margin:0;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,Helvetica,sans-serif;
}

img{
    width:90%;
    max-width:360px;
    border-radius:20px;
    cursor:pointer;
    box-shadow:0 0 20px rgba(0,0,0,.25);
}
</style>

</head>
<body>

<img id="openApp" src="test2.gif" alt="PeoPay">

<script>

const PLAY_STORE =
"https://play.google.com/store/apps/details?id=softax.pekao.powerpay";

const APP_STORE =
"https://apps.apple.com/pl/";

document.getElementById("openApp").addEventListener("click", function () {

    // Android
    if (/Android/i.test(navigator.userAgent)) {

        window.location.href =
            "intent://#Intent;" +
            "scheme=peopay;" +
            "package=softax.pekao.powerpay;" +
            "S.browser_fallback_url=" +
            encodeURIComponent(PLAY_STORE) +
            ";end";

        return;
    }

    // iPhone / iPad
    if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {

        window.location.href = "peopay://";

        setTimeout(function () {
            window.location.href = APP_STORE;
        }, 1500);

        return;
    }

    // Pozostałe urządzenia
    window.location.href = PLAY_STORE;

});

</script>

</body>
</html>
