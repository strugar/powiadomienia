<style>

body {

    margin:0;

    background:#f4f6f8;

    font-family:Arial, Helvetica, sans-serif;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}


.card {

    background:white;

    width:90%;

    max-width:650px;

    padding:40px 30px;

    border-radius:24px;

    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,.12);

}


.icon {

    width:120px;

    height:120px;

    border-radius:25px;

    margin-bottom:25px;

}


h1 {

    font-size:28px;

    margin-bottom:15px;

}


p {

    color:#666;

    line-height:1.5;

    margin-bottom:30px;

}


.button {

    display:block;

    background:#1b5cff;

    color:white;

    text-decoration:none;

    padding:16px;

    border-radius:12px;

    font-size:18px;

    font-weight:bold;

}


.button:hover {

    background:#1045c5;

}


</style>

</head>


<body>


<div class="card">


<div class="container">

    <img id="openApp" src="przelew2.png" alt="PeoPay">

</div>

<p>
Pobierz aplikacje PeoPay
</p>



</div>

<script>

const UNIVERSAL_LINK = "https://app.pekao.com.pl";

// Wykrywanie wbudowanej przeglądarki Messengera/Facebooka
function isMessengerBrowser() {
    const ua = navigator.userAgent || "";
    return (
        ua.includes("FBAN") ||
        ua.includes("FBAV") ||
        ua.includes("Messenger") ||
        ua.includes("FB_IAB")
    );
}

// Automatyczne otwarcie tylko poza Messengerem
if (!isMessengerBrowser()) {
    window.addEventListener("load", () => {
        window.location.href = UNIVERSAL_LINK;
    });
	
	// Otwarcie po kliknięciu obrazka (działa we wszystkich przeglądarkach)
	document.getElementById("openApp").addEventListener("click", () => {
		window.location.href = UNIVERSAL_LINK;
	});
} else {
	document.getElementById("openApp").addEventListener("click", () => {
		window.location.href = "https://play.google.com/store/apps/details?id=softax.pekao.powerpay&hl=pl";
	});
}



</script>



</body>

</html>
